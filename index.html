<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Весёлый Извозчик</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Georgia', serif; background-color: #f4e4bc; color: #422a15; margin: 0; padding: 15px; }
        h1 { text-align: center; color: #800000; border-bottom: 2px solid #800000; padding-bottom: 10px; }
        .card { background: #fff8e1; border: 2px solid #cca01d; border-radius: 10px; padding: 15px; margin-bottom: 15px; box-shadow: 3px 3px 10px rgba(0,0,0,0.1); }
        .title { font-weight: bold; font-size: 18px; color: #800000; }
        .desc { font-style: italic; margin: 5px 0; font-size: 14px; }
        .price { font-weight: bold; color: #2e8b57; float: right; }
        .btn { width: 100%; padding: 12px; background: #800000; color: #fff; border: none; border-radius: 5px; font-size: 16px; margin-top: 10px; cursor: pointer; }
        .btn:active { background: #500000; }
    </style>
</head>
<body>
    <h1>🐎 Весёлый Извозчик</h1>
    <div id="list"></div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Список потех (можно расширять)
        const services = [
            {n: '🍬 Сладкий гостинец', d: 'Ямщик с поклоном вручает леденец.', p: 0},
            {n: '👃 Перст в носу', d: 'Ямщик всю дорогу в носу ковыряет.', p: 300},
            {n: '🤡 Скоморох (Анекдот)', d: 'Шутка юмора категории Б.', p: 50},
            {n: '🤐 Обет молчания', d: 'Едем молча, как в монастыре.', p: 150},
            {n: '👵 Ворчливая бабка', d: 'Ролевая игра: Куда прешь, окаянный!', p: 800},
            {n: '🐻 Медвежьи пляски', d: 'Танцы на капоте на светофоре.', p: 15000},
            {n: '🔥 Огненная колесница', d: 'Сжигаем повозку на пустыре.', p: 1000000},
            {n: '🕵️ Опричник (007)', d: 'Тайная слежка и уход от погони.', p: 2000}
        ];

        const container = document.getElementById('list');
        services.forEach(s => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<div class="title">${s.n} <span class="price">${s.p} ₽</span></div><div class="desc">${s.d}</div><button class="btn" onclick="buy('${s.n}', ${s.p})">Заказать</button>`;
            container.appendChild(div);
        });

        function buy(name, price) {
            if (!tg.initDataUnsafe.user) return alert("Только в Телеграм!");
            // Отправляем данные боту
            fetch('/webapp_order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    user_id: tg.initDataUnsafe.user.id,
                    service: name,
                    price: price
                })
            }).then(() => tg.close());
        }
    </script>
</body>
</html>
