<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Весёлый Извозчик</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; padding: 10px; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .price { color: #2ecc71; font-weight: bold; }
        .btn { background: #3498db; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; margin-top: 10px; cursor: pointer; }
        .cat-tag { font-size: 10px; background: #e67e22; color: white; padding: 2px 6px; border-radius: 4px; float: right; }
    </style>
</head>
<body>
    <h2 style="text-align: center;">📜 Репертуар Артели</h2>
    <div id="services-list">Загрузка потех...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : 0;

        // Загружаем услуги динамически
        fetch(`/get_services?user_id=${userId}`)
            .then(r => r.json())
            .then(data => {
                const container = document.getElementById('services-list');
                container.innerHTML = '';
                if (data.error) {
                    container.innerHTML = '<p>Пожалуйста, сначала введите код Ямщика в боте!</p>';
                    return;
                }
                data.forEach(s => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <span class="cat-tag">${s.cat}</span>
                        <div style="font-weight:bold">${s.name}</div>
                        <div style="font-size:12px; color: #666">${s.desc}</div>
                        <div class="price">${s.price}₽</div>
                        <button class="btn" onclick="order('${s.name}', ${s.price})">ЗАКАЗАТЬ</button>
                    `;
                    container.appendChild(card);
                });
            });

        function order(name, price) {
            navigator.geolocation.getCurrentPosition(pos => {
                fetch('/webapp_order', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: userId, service: name, price: price,
                        lat: pos.coords.latitude, lon: pos.coords.longitude
                    })
                }).then(() => {
                    tg.showAlert("Ямщик уже запрягает! Ожидайте.");
                    tg.close();
                });
            }, () => alert("Нужен GPS, чтобы ямщик вас нашел!"));
        }
    </script>
</body>
</html>
